<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doomsday Explorer – Intro</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#111;font-family:"Arial",sans-serif;}
  canvas{display:block;width:100%;height:100%;}
  .panel{position:absolute;top:30%;left:50%;transform:translate(-50%,-30%);text-align:center;color:#fff;pointer-events:none;}
  .panel h1{margin:0 0 .8rem;font-size:3rem;text-shadow:0 0 8px rgb(255,0,0);}
  .panel h3{margin:0 0 .8rem;font-size:1.5rem;text-shadow:0 0 8px rgb(36,25,25);}
  .panel a{
    pointer-events:auto;display:inline-block;padding:.8rem 2rem;margin-top:.4rem;
    font-size:1.2rem;color:#111;background:rgb(246,255,0);border:none;border-radius:.4rem;
    text-decoration:none;box-shadow:0 0 12px rgb(255,0,0);transition:background .2s,transform .2s;
  }
  .panel a:hover{background:rgb(219, 88, 2);transform:translateY(-2px);}
</style>
</head>

<body>
<div class="panel">
  <h1>Doomsday Explorer</h1>
  <h3>Early‑warning system for Bitcoin wallets</h3>
  <a href="https://dk14.github.io/crypto/" target="_blank">Enter →</a>
</div>

<canvas id="noise"></canvas>

<script>
/* ---------- seeded PRNG (mulberry32) ---------- */
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ---------- noise rendering ---------- */
const canvas = document.getElementById('noise');
const ctx = canvas.getContext('2d');
let width, height, imageData, data;

/* set canvas to fill the viewport */
function resize() {
  canvas.width = width = window.innerWidth;
  canvas.height = height = window.innerHeight;
  imageData = ctx.createImageData(width, height);
  data = imageData.data;
}
window.addEventListener('resize', resize);
resize();

/* seed can be any 32‑bit integer – change it for a different pattern */
const rng = mulberry32(0x1a2b3c4d);

/* draw one frame of white noise */
function draw() {
  for (let i = 0, len = data.length; i < len; i += 4) {
    const v = rng() * 90;       // 0‑255 grayscale
    data[i] = data[i+1] = data[i+2] = v; // R,G,B
    data[i+3] = 255;            // opaque alpha
  }
  ctx.putImageData(imageData, 0, 0);
}

/* animate – 30 fps gives a smooth “static” feel */
let then = 0;
function animate(now) {
  const delta = now - then;
  if (delta > 1000/30) { // ~30 fps
    draw();
    then = now;
  }
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
